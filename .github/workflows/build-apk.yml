name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup consistent signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p $HOME/.android
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Lade gespeichertes Keystore aus Secret..."
            echo "$KEYSTORE_B64" | base64 -d > $HOME/.android/debug.keystore
          else
            echo "Kein Secret gefunden – generiere einmaliges Keystore."
            keytool -genkey -v \
              -keystore $HOME/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo ""
            echo "================================================================"
            echo "EINMALIGE SETUP-AKTION ERFORDERLICH – nur einmal nötig:"
            echo "Kopiere den folgenden Wert und füge ihn als GitHub-Secret ein:"
            echo "  Repo → Settings → Secrets → Actions → New secret"
            echo "  Name:  KEYSTORE_BASE64"
            echo "  Wert:  (folgender Base64-String)"
            echo "================================================================"
            base64 -w 0 $HOME/.android/debug.keystore
            echo ""
            echo "================================================================"
            echo "Danach: alte App einmalig deinstallieren, neu installieren."
            echo "Ab dann: Updates ohne Deinstallation möglich."
            echo "================================================================"
          fi

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MTGCommander-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
