name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup release keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p $HOME/.android
          KEYSTORE_FILE="$HOME/.android/release.keystore"
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Lade Keystore aus Secret..."
            echo "$KEYSTORE_B64" | base64 -d > "$KEYSTORE_FILE"
          else
            echo "Kein Secret gefunden – generiere einmaliges Keystore."
            keytool -genkey -v \
              -keystore "$KEYSTORE_FILE" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=MTG Commander,O=MTGCommander,C=DE"
          fi
          echo "KEYSTORE_PATH=$KEYSTORE_FILE" >> $GITHUB_ENV

      - name: Generate Gradle Wrapper JAR
        run: gradle wrapper --gradle-version=8.4

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace --info 2>&1 | tee build-output.txt; exit ${PIPESTATUS[0]}
        env:
          ANDROID_HOME:     /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          BUILD_NUMBER:     ${{ github.run_number }}
          KEYSTORE_PASS:    android
          KEY_ALIAS:        androiddebugkey
          KEY_PASS:         android

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-v${{ github.run_number }}
          path: build-output.txt
          retention-days: 7

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MTGCommander-v${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
